<!-- Paste this inside your WordPress Custom HTML block within the flexbox -->
<div id="d3-force-container"
    style="width: 100%; max-width: 500px; aspect-ratio: 1 / 1; position: relative; overflow: hidden; border-radius: 12px; background: transparent; margin: 0 auto;">
    <canvas id="d3-force-canvas" style="display: block; width: 100%; height: 100%; cursor: pointer;"></canvas>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    (function () {
        const container = document.getElementById("d3-force-container");
        const canvas = document.getElementById("d3-force-canvas");
        const dpr = window.devicePixelRatio || 1;
        const context = canvas.getContext("2d");

        // Size canvas to the container's actual rendered size (HiDPI)
        const rect = container.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        context.scale(dpr, dpr);

        const bubbleColor = "#2a2a2a";

        // Generate data
        const k = width / 200;
        const r = d3.randomUniform(k * 2, k * 4);
        const n = 4;
        const data = Array.from({ length: 200 }, (_, i) => ({ r: r(), group: i && (i % n + 1) }));

        const nodes = data.map(d => ({ ...d }));

        const simulation = d3.forceSimulation(nodes)
            .alphaTarget(0.3)
            .velocityDecay(0.1)
            .force("x", d3.forceX().strength(0.01))
            .force("y", d3.forceY().strength(0.01))
            .force("collide", d3.forceCollide().radius(d => d.r + 1).iterations(3))
            .force("charge", d3.forceManyBody().strength((d, i) => i ? 0 : -width * 2 / 3))
            .on("tick", ticked);

        canvas.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
        canvas.addEventListener("pointermove", pointermoved);

        function pointermoved(event) {
            const cRect = canvas.getBoundingClientRect();
            const x = event.clientX - cRect.left;
            const y = event.clientY - cRect.top;
            nodes[0].fx = x - width / 2;
            nodes[0].fy = y - height / 2;
        }

        function ticked() {
            context.clearRect(0, 0, width, height);
            context.save();
            context.translate(width / 2, height / 2);
            context.shadowColor = "rgba(0, 0, 0, 0.3)";
            context.shadowBlur = 4;
            context.shadowOffsetX = 1;
            context.shadowOffsetY = 1;
            for (let i = 1; i < nodes.length; ++i) {
                const d = nodes[i];
                context.beginPath();
                context.arc(d.x, d.y, d.r, 0, 2 * Math.PI);
                context.fillStyle = bubbleColor;
                context.fill();
            }
            context.shadowColor = "transparent";
            context.shadowBlur = 0;
            context.restore();
        }
    })();
</script>
