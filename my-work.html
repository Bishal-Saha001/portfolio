    <div class="iframe-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 0;">
        <!-- Trying to hide the ~100px header from the live site by negative margin -->
        <iframe id="my-works-iframe" src="https://bishalsaha.in/my-works" style="width: 100%; height: calc(100vh + 120px); border: none; margin-top: -120px;"></iframe>
    </div>

    <!-- Script to dynamically load dark/light iframe urls -->
    <script>
        const worksIframe = document.getElementById('my-works-iframe');
        const updateIframeSrc = () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            const targetUrl = isDark ? 'https://bishalsaha.in/my-works-dark' : 'https://bishalsaha.in/my-works';
            if (worksIframe.src !== targetUrl) {
                worksIframe.src = targetUrl;
            }
        };

        // Initial set based on currently applied classes
        updateIframeSrc();

        // Listen for dark mode toggles via class changes on HTML element
        const observer = new MutationObserver(updateIframeSrc);
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    </script>
